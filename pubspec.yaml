name: rentify
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Appwrite & State Management
  appwrite: ^23.0.0
  flutter_riverpod: ^3.3.1
  
  # Routing
  go_router: ^17.1.0
  
  # UI Helpers
  cached_network_image: ^3.3.1
  intl: ^0.20.2
  fluttertoast: ^9.0.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  lottie: ^3.1.2
  image_picker: ^1.1.2
  
  # Maps (Flutter Maps - open source)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # Other dependencies
  table_calendar: ^3.0.9
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  http: ^1.6.0
  url_launcher: ^6.3.2
  geolocator: ^12.0.0
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
